  <text x="42" y="42" fill="#C8FFF2" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.4">SHOWCASE 03</text>
  <text x="24" y="86" fill="#9CF8E0" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.1">ML RECIPE ASSISTANT</text>
  <text x="24" y="124" fill="#F5FFFB" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">Fudget</text>

  <text x="24" y="156" fill="#DFFAF2" font-family="Verdana, Arial, sans-serif" font-size="16">Detect ingredients, infer what is on hand,</text>
  <text x="24" y="178" fill="#DFFAF2" font-family="Verdana, Arial, sans-serif" font-size="16">and recommend practical recipes through</text>
  <text x="24" y="200" fill="#DFFAF2" font-family="Verdana, Arial, sans-serif" font-size="16">a mobile app powered by CreateML.</text>

  <rect x="24" y="220" width="68" height="24" rx="12" fill="#10443B" stroke="#8EF7DB" stroke-opacity="0.22"/>
  <text x="46" y="236" fill="#F0FFFA" font-family="Verdana, Arial, sans-serif" font-size="12">Swift</text>
  <rect x="98" y="220" width="84" height="24" rx="12" fill="#10443B" stroke="#8EF7DB" stroke-opacity="0.22"/>
  <text x="120" y="236" fill="#F0FFFA" font-family="Verdana, Arial, sans-serif" font-size="12">CreateML</text>
  <rect x="188" y="220" width="80" height="24" rx="12" fill="#10443B" stroke="#8EF7DB" stroke-opacity="0.22"/>
  <text x="210" y="236" fill="#F0FFFA" font-family="Verdana, Arial, sans-serif" font-size="12">REST API</text>
  <text x="318" y="236" fill="#C8FFF2" font-family="Verdana, Arial, sans-serif" font-size="12" letter-spacing="1.2">OPEN REPO -&gt;</text>

<svg width="420" height="260" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fudget showcase card</title>
  <desc id="desc">A fresh product card for Fudget, an ML-powered recipe recommendation app.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="10" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081E1B"/>
      <stop offset="0.48" stop-color="#0F3E38"/>
      <stop offset="1" stop-color="#081715"/>
    </linearGradient>
    <linearGradient id="pill" x1="24" y1="22" x2="160" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#115046"/>
      <stop offset="1" stop-color="#0B362F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(332 78) rotate(35) scale(100 78)">
      <stop stop-color="#6CF8D0" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#6CF8D0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#98FFE2" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="420" height="260" rx="28" fill="url(#bg)"/>
  <rect width="420" height="260" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="418" height="258" rx="27" fill="none" stroke="#8EF7DB" stroke-opacity="0.18"/>
  <circle cx="332" cy="78" r="96" fill="url(#glow)"/>

  <path d="M286 161C290 184 308 200 332 200C356 200 374 184 378 161" fill="none" stroke="#C5FFF0" stroke-opacity="0.76" stroke-width="3"/>
  <path d="M296 162H368" fill="none" stroke="#C5FFF0" stroke-opacity="0.76" stroke-width="3"/>
  <path d="M307 145C307 137 313 130 321 130H343C351 130 357 137 357 145" fill="none" stroke="#93F7DE" stroke-opacity="0.54" stroke-width="2"/>
  <circle cx="302" cy="92" r="10" fill="#C8FFF1" fill-opacity="0.80"/>
  <circle cx="330" cy="72" r="14" fill="#9AFADF" fill-opacity="0.72"/>
  <circle cx="361" cy="98" r="9" fill="#DAFFF6" fill-opacity="0.84"/>
  <path d="M309 54C317 42 327 38 339 42" fill="none" stroke="#9AFADF" stroke-opacity="0.70" stroke-width="2"/>
  <path d="M347 46C357 35 369 32 382 37" fill="none" stroke="#9AFADF" stroke-opacity="0.52" stroke-width="2"/>


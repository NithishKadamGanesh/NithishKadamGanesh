<svg width="1120" height="280" viewBox="0 0 1120 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fudget project card</title>
  <desc id="desc">A modern full-width project card for Fudget.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="10" x2="1100" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081D1A"/>
      <stop offset="0.52" stop-color="#104138"/>
      <stop offset="1" stop-color="#081713"/>
    </linearGradient>
    <linearGradient id="chip" x1="36" y1="32" x2="170" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#125248"/>
      <stop offset="1" stop-color="#0B372F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(958 58) rotate(18) scale(220 130)">
      <stop stop-color="#6DF8D0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6DF8D0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#99FFE2" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1120" height="280" rx="30" fill="url(#bg)"/>
  <rect width="1120" height="280" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1118" height="278" rx="29" fill="none" stroke="#91F8DC" stroke-opacity="0.16"/>
  <circle cx="958" cy="58" r="198" fill="url(#glow)"/>

  <circle cx="915" cy="74" r="20" fill="#7CF9D8" fill-opacity="0.72"/>
  <circle cx="964" cy="108" r="11" fill="#DFFFF7" fill-opacity="0.84"/>
  <circle cx="881" cy="104" r="14" fill="#CFFFF3" fill-opacity="0.80"/>
  <path d="M866 184C872 212 896 232 928 232C960 232 984 212 990 184" fill="none" stroke="#C8FFF1" stroke-opacity="0.78" stroke-width="4"/>
  <path d="M880 186H976" fill="none" stroke="#C8FFF1" stroke-opacity="0.78" stroke-width="4"/>
  <path d="M897 160C897 149 905 141 916 141H940C951 141 959 149 959 160" fill="none" stroke="#97F9E0" stroke-opacity="0.58" stroke-width="3"/>
  <path d="M888 60C897 47 911 41 927 44" fill="none" stroke="#97F9E0" stroke-opacity="0.64" stroke-width="3"/>
  <path d="M945 52C957 39 972 34 989 40" fill="none" stroke="#97F9E0" stroke-opacity="0.48" stroke-width="3"/>

  <rect x="36" y="30" width="144" height="30" rx="15" fill="url(#chip)" stroke="#8FF7DC" stroke-opacity="0.18"/>
  <text x="59" y="50" fill="#C8FFF2" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.3">SHOWCASE / 03</text>

  <text x="36" y="96" fill="#9EF8E0" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.3">ML RECIPE ASSISTANT</text>
  <text x="36" y="154" fill="#F5FFFB" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="700">Fudget</text>
  <text x="36" y="194" fill="#DFFAF2" font-family="Verdana, Arial, sans-serif" font-size="22">Mobile app that detects ingredients and recommends</text>
  <text x="36" y="224" fill="#DFFAF2" font-family="Verdana, Arial, sans-serif" font-size="22">practical recipes using CreateML and REST APIs.</text>

  <path d="M726 214H1084" fill="none" stroke="#8FF7DC" stroke-opacity="0.16" stroke-width="1.5"/>
  <text x="726" y="250" fill="#CBFFF4" font-family="Verdana, Arial, sans-serif" font-size="19">Swift • CreateML • REST APIs</text>

<svg width="1120" height="280" viewBox="0 0 1120 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CityDiaries project card</title>
  <desc id="desc">A modern full-width project card for CityDiaries.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="10" x2="1100" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A1115"/>
      <stop offset="0.54" stop-color="#5A1E25"/>
      <stop offset="1" stop-color="#291013"/>
    </linearGradient>
    <linearGradient id="chip" x1="36" y1="32" x2="170" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C242B"/>
      <stop offset="1" stop-color="#4D1A1F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(952 56) rotate(26) scale(220 130)">
      <stop stop-color="#FF936F" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FF936F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#FFB18D" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1120" height="280" rx="30" fill="url(#bg)"/>
  <rect width="1120" height="280" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1118" height="278" rx="29" fill="none" stroke="#FFB08C" stroke-opacity="0.16"/>
  <circle cx="952" cy="56" r="198" fill="url(#glow)"/>

  <path d="M824 208C862 175 903 147 949 124C990 105 1029 90 1076 82" fill="none" stroke="#FFB08A" stroke-opacity="0.78" stroke-width="4"/>
  <path d="M828 210C865 231 899 245 937 252C977 259 1021 259 1074 254" fill="none" stroke="#FFD1B8" stroke-opacity="0.42" stroke-width="3"/>
  <circle cx="816" cy="210" r="11" fill="#FFF1E8"/>
  <circle cx="934" cy="92" r="36" fill="none" stroke="#FFD0B7" stroke-opacity="0.68" stroke-width="3"/>
  <circle cx="934" cy="92" r="8" fill="#FFE0D0"/>

  <rect x="36" y="30" width="144" height="30" rx="15" fill="url(#chip)" stroke="#FFB08C" stroke-opacity="0.18"/>
  <text x="59" y="50" fill="#FFD8C6" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.3">SHOWCASE / 02</text>

  <text x="36" y="96" fill="#FFC3A5" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.3">TRAVEL DISCOVERY APP</text>
  <text x="36" y="154" fill="#FFF6F1" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="700">CityDiaries</text>
  <text x="36" y="194" fill="#FFE2D5" font-family="Verdana, Arial, sans-serif" font-size="22">Social travel diary for sharing hotspots, photos, memories,</text>
  <text x="36" y="224" fill="#FFE2D5" font-family="Verdana, Arial, sans-serif" font-size="22">comments, and places worth revisiting.</text>

  <path d="M726 214H1084" fill="none" stroke="#FFB08C" stroke-opacity="0.16" stroke-width="1.5"/>
  <text x="726" y="250" fill="#FFD4C0" font-family="Verdana, Arial, sans-serif" font-size="19">MongoDB • EJS • Express • Node.js</text>
</svg>

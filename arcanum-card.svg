<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arcanum showcase card</title>
  <desc id="desc">A large showcase card for Arcanum.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="840" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08131C"/>
      <stop offset="0.56" stop-color="#0B2336"/>
      <stop offset="1" stop-color="#09141D"/>
    </linearGradient>
    <linearGradient id="statA" x1="548" y1="74" x2="636" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102E45"/>
      <stop offset="1" stop-color="#0D2232"/>
    </linearGradient>
    <linearGradient id="statB" x1="650" y1="74" x2="738" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14382E"/>
      <stop offset="1" stop-color="#0B241D"/>
    </linearGradient>
    <linearGradient id="statC" x1="752" y1="74" x2="840" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#362617"/>
      <stop offset="1" stop-color="#1D150E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(708 42) rotate(25) scale(188 120)">
      <stop stop-color="#26D7FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#26D7FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#74D7FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="860" height="280" rx="32" fill="url(#bg)"/>
  <rect width="860" height="280" rx="32" fill="url(#grid)"/>
  <rect x="1" y="1" width="858" height="278" rx="31" fill="none" stroke="#87E5FF" stroke-opacity="0.16"/>
  <circle cx="708" cy="42" r="188" fill="url(#glowA)"/>

  <rect x="34" y="34" width="144" height="32" rx="16" fill="#0F2435" stroke="#7CDFFF" stroke-opacity="0.20"/>
  <text x="58" y="55" fill="#9DEBFF" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.4">SHOWCASE / 01</text>

  <text x="34" y="102" fill="#88D8FF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.3">LIVE PUZZLE PLATFORM</text>
  <text x="34" y="154" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="52" font-weight="700">Arcanum</text>
  <text x="34" y="192" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="20">Built for a 10-hour event with auth, hints,</text>
  <text x="34" y="220" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="20">leaderboards, and answer feedback.</text>

  <rect x="548" y="74" width="88" height="94" rx="22" fill="url(#statA)" stroke="#87E5FF" stroke-opacity="0.14"/>
  <text x="570" y="108" fill="#A1E8FF" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.1">PLAYERS</text>
  <text x="566" y="144" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700">140+</text>

  <rect x="650" y="74" width="88" height="94" rx="22" fill="url(#statB)" stroke="#7EF8D2" stroke-opacity="0.14"/>
  <text x="678" y="108" fill="#9CF5DE" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.1">LIVE</text>
  <text x="670" y="144" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700">90+</text>

  <rect x="752" y="74" width="88" height="94" rx="22" fill="url(#statC)" stroke="#FFD86B" stroke-opacity="0.14"/>
  <text x="768" y="108" fill="#FFD86B" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.1">SUBMITS</text>
  <text x="768" y="144" fill="#FFFDF6" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700">12K+</text>

  <path d="M548 222H840" fill="none" stroke="#87E5FF" stroke-opacity="0.16" stroke-width="1.5"/>
  <text x="548" y="252" fill="#9DEBFF" font-family="Verdana, Arial, sans-serif" font-size="17">React . FastAPI . PostgreSQL</text>

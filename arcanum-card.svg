<svg width="1120" height="280" viewBox="0 0 1120 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arcanum project card</title>
  <desc id="desc">A modern full-width project card for Arcanum.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="10" x2="1100" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081520"/>
      <stop offset="0.56" stop-color="#0B2740"/>
      <stop offset="1" stop-color="#07131C"/>
    </linearGradient>
    <linearGradient id="chip" x1="36" y1="32" x2="170" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#133A59"/>
      <stop offset="1" stop-color="#0B2538"/>
    </linearGradient>
    <linearGradient id="metricA" x1="726" y1="70" x2="842" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12324C"/>
      <stop offset="1" stop-color="#0C2233"/>
    </linearGradient>
    <linearGradient id="metricB" x1="864" y1="70" x2="980" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#133A32"/>
      <stop offset="1" stop-color="#0A241F"/>
    </linearGradient>
    <linearGradient id="metricC" x1="1002" y1="70" x2="1084" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A2816"/>
      <stop offset="1" stop-color="#20150D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(934 40) rotate(18) scale(220 130)">
      <stop stop-color="#26D7FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#26D7FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#76D9FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1120" height="280" rx="30" fill="url(#bg)"/>
  <rect width="1120" height="280" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1118" height="278" rx="29" fill="none" stroke="#89E4FF" stroke-opacity="0.16"/>
  <circle cx="934" cy="40" r="198" fill="url(#glow)"/>

  <rect x="36" y="30" width="144" height="30" rx="15" fill="url(#chip)" stroke="#7AD9FF" stroke-opacity="0.18"/>
  <text x="59" y="50" fill="#9DEBFF" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.3">SHOWCASE / 01</text>

  <text x="36" y="96" fill="#88D8FF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.3">LIVE PUZZLE PLATFORM</text>
  <text x="36" y="154" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="700">Arcanum</text>
  <text x="36" y="194" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="22">University-wide event platform with auth, hints, leaderboards,</text>
  <text x="36" y="224" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="22">and answer-feedback systems built for a 10-hour live experience.</text>

  <rect x="726" y="70" width="116" height="110" rx="26" fill="url(#metricA)" stroke="#86E3FF" stroke-opacity="0.14"/>
  <text x="760" y="110" fill="#9CEAFF" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.0">PLAYERS</text>
  <text x="756" y="150" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">140+</text>

  <rect x="864" y="70" width="116" height="110" rx="26" fill="url(#metricB)" stroke="#8BF5D9" stroke-opacity="0.14"/>
  <text x="903" y="110" fill="#9AF4DD" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.0">LIVE</text>
  <text x="894" y="150" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">90+</text>

  <rect x="1002" y="70" width="82" height="110" rx="26" fill="url(#metricC)" stroke="#FFD86B" stroke-opacity="0.14"/>
  <text x="1016" y="110" fill="#FFD86B" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.0">EVENT</text>
  <text x="1012" y="150" fill="#FFFDF6" font-family="Verdana, Arial, sans-serif" font-size="28" font-weight="700">12K+</text>

  <path d="M726 214H1084" fill="none" stroke="#89E4FF" stroke-opacity="0.16" stroke-width="1.5"/>
  <text x="726" y="250" fill="#A0EDFF" font-family="Verdana, Arial, sans-serif" font-size="19">React • FastAPI • PostgreSQL • SQLAlchemy</text>
</svg>

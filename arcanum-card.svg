<svg width="860" height="300" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arcanum showcase card</title>
  <desc id="desc">A clean large-format showcase card for Arcanum.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="840" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08131C"/>
      <stop offset="0.56" stop-color="#0B2336"/>
      <stop offset="1" stop-color="#09141D"/>
    </linearGradient>
    <linearGradient id="statA" x1="510" y1="82" x2="610" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102E45"/>
      <stop offset="1" stop-color="#0D2232"/>
    </linearGradient>
    <linearGradient id="statB" x1="628" y1="82" x2="728" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14382E"/>
      <stop offset="1" stop-color="#0B241D"/>
    </linearGradient>
    <linearGradient id="statC" x1="746" y1="82" x2="826" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#362617"/>
      <stop offset="1" stop-color="#1D150E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(686 42) rotate(25) scale(190 120)">
      <stop stop-color="#26D7FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#26D7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(794 232) rotate(0) scale(160 110)">
      <stop stop-color="#80F5D5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#80F5D5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#74D7FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="860" height="300" rx="32" fill="url(#bg)"/>
  <rect width="860" height="300" rx="32" fill="url(#grid)"/>
  <rect x="1" y="1" width="858" height="298" rx="31" fill="none" stroke="#87E5FF" stroke-opacity="0.16"/>

  <circle cx="686" cy="42" r="188" fill="url(#glowA)"/>
  <circle cx="794" cy="232" r="142" fill="url(#glowB)"/>

  <rect x="34" y="34" width="144" height="32" rx="16" fill="#0F2435" stroke="#7CDFFF" stroke-opacity="0.20"/>
  <text x="58" y="55" fill="#9DEBFF" font-family="Verdana, Arial, sans-serif" font-size="13" letter-spacing="1.4">SHOWCASE / 01</text>

  <text x="34" y="104" fill="#88D8FF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.3">LIVE PUZZLE PLATFORM</text>
  <text x="34" y="156" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="54" font-weight="700">Arcanum</text>
  <text x="34" y="195" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="22">Immersive event platform with hints, leaderboards,</text>
  <text x="34" y="226" fill="#D6E8F3" font-family="Verdana, Arial, sans-serif" font-size="22">auth flows, and answer-feedback systems.</text>

  <rect x="506" y="82" width="100" height="118" rx="24" fill="url(#statA)" stroke="#87E5FF" stroke-opacity="0.14"/>
  <text x="536" y="132" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">140+</text>
  <text x="528" y="162" fill="#C9DFEB" font-family="Verdana, Arial, sans-serif" font-size="16">players</text>

  <rect x="624" y="82" width="100" height="118" rx="24" fill="url(#statB)" stroke="#7EF8D2" stroke-opacity="0.14"/>
  <text x="654" y="132" fill="#F7FCFF" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">90+</text>
  <text x="638" y="162" fill="#C9DFEB" font-family="Verdana, Arial, sans-serif" font-size="16">concurrent</text>

  <rect x="742" y="82" width="100" height="118" rx="24" fill="url(#statC)" stroke="#FFD86B" stroke-opacity="0.14"/>
  <text x="768" y="132" fill="#FFFDF6" font-family="Verdana, Arial, sans-serif" font-size="34" font-weight="700">12K+</text>
  <text x="762" y="162" fill="#E7D7BF" font-family="Verdana, Arial, sans-serif" font-size="16">submits</text>

  <path d="M514 234H836" fill="none" stroke="#87E5FF" stroke-opacity="0.16" stroke-width="1.5"/>
  <text x="514" y="264" fill="#9DEBFF" font-family="Verdana, Arial, sans-serif" font-size="18">React . FastAPI . PostgreSQL . SQLAlchemy</text>
</svg>

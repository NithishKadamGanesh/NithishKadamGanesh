<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nithish Kadam Ganesh hero panel</title>
  <desc id="desc">A modern profile banner with bold typography and a clean bento-inspired layout.</desc>
  <defs>
    <linearGradient id="bg" x1="30" y1="30" x2="1120" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071018"/>
      <stop offset="0.48" stop-color="#0A2030"/>
      <stop offset="1" stop-color="#09141E"/>
    </linearGradient>
    <linearGradient id="panelA" x1="760" y1="110" x2="1100" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E3048"/>
      <stop offset="1" stop-color="#102130"/>
    </linearGradient>
    <linearGradient id="panelB" x1="760" y1="250" x2="930" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12392E"/>
      <stop offset="1" stop-color="#0C241E"/>
    </linearGradient>
    <linearGradient id="panelC" x1="950" y1="250" x2="1110" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A2814"/>
      <stop offset="1" stop-color="#21160C"/>
    </linearGradient>
    <linearGradient id="panelD" x1="760" y1="380" x2="1110" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#181F2D"/>
      <stop offset="1" stop-color="#101723"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(104 92) rotate(35) scale(220 180)">
      <stop stop-color="#1FD4FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#26D7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 96) rotate(160) scale(260 180)">
      <stop stop-color="#78F5D3" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#7EF8D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(972 442) rotate(20) scale(230 170)">
      <stop stop-color="#FFD86B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFD86B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#86D8FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#010407" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="560" rx="36" fill="url(#grid)"/>

  <circle cx="104" cy="92" r="168" fill="url(#glowA)" filter="url(#softBlur)"/>
  <circle cx="1050" cy="96" r="196" fill="url(#glowB)" filter="url(#softBlur)"/>
  <circle cx="972" cy="442" r="170" fill="url(#glowC)" filter="url(#softBlur)"/>

  <rect x="62" y="54" width="188" height="38" rx="19" fill="#0C1E2C" fill-opacity="0.94" stroke="#66D9FF" stroke-opacity="0.24"/>
  <text x="89" y="79" fill="#A6EDFF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.8">SOFTWARE ENGINEER</text>

  <text x="62" y="178" fill="#F4FBFF" font-family="Verdana, Arial, sans-serif" font-size="78" font-weight="700">Nithish</text>
  <text x="62" y="258" fill="#F4FBFF" font-family="Verdana, Arial, sans-serif" font-size="74" font-weight="700">Kadam Ganesh</text>
  <text x="62" y="314" fill="#9BDEFF" font-family="Verdana, Arial, sans-serif" font-size="28">Backend systems. Cloud infra. Product experiences.</text>

  <text x="62" y="366" fill="#D8EAF6" font-family="Verdana, Arial, sans-serif" font-size="22">M.S. Computer Science at Northeastern | Ex-Manhattan Associates | AWS SAA</text>
  <text x="62" y="400" fill="#B8D0DE" font-family="Verdana, Arial, sans-serif" font-size="19">I build practical systems that stay clean under load and still feel good to use.</text>

  <rect x="62" y="442" width="176" height="44" rx="22" fill="#101E31" stroke="#67D6FF" stroke-opacity="0.18"/>
  <text x="94" y="470" fill="#F2FBFF" font-family="Verdana, Arial, sans-serif" font-size="18">Open to roles</text>

  <rect x="252" y="442" width="154" height="44" rx="22" fill="#101E31" stroke="#67D6FF" stroke-opacity="0.18"/>
  <text x="290" y="470" fill="#F2FBFF" font-family="Verdana, Arial, sans-serif" font-size="18">Boston, MA</text>

  <rect x="420" y="442" width="178" height="44" rx="22" fill="#101E31" stroke="#67D6FF" stroke-opacity="0.18"/>
  <text x="454" y="470" fill="#F2FBFF" font-family="Verdana, Arial, sans-serif" font-size="18">Shipping Arcanum</text>

  <rect x="736" y="84" width="392" height="136" rx="28" fill="url(#panelA)" stroke="#84E2FF" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="766" y="122" fill="#8EDFFF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.2">SELECTED FOCUS</text>
  <text x="766" y="170" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="36" font-weight="700">Java . Go . FastAPI</text>
  <text x="766" y="198" fill="#CADCE7" font-family="Verdana, Arial, sans-serif" font-size="17">Backend-first engineering</text>
  <text x="766" y="218" fill="#CADCE7" font-family="Verdana, Arial, sans-serif" font-size="17">with a product mindset</text>

  <rect x="736" y="244" width="180" height="116" rx="28" fill="url(#panelB)" stroke="#7EF8D2" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="766" y="282" fill="#8BF4D7" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.2">NOW</text>
  <text x="766" y="324" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="33" font-weight="700">Open</text>
  <text x="766" y="347" fill="#C9E3DC" font-family="Verdana, Arial, sans-serif" font-size="18">to SWE roles</text>

  <rect x="948" y="244" width="180" height="116" rx="28" fill="url(#panelC)" stroke="#FFD86B" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="978" y="282" fill="#FFD86B" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.2">CERTIFIED</text>
  <text x="978" y="324" fill="#FFFDF6" font-family="Verdana, Arial, sans-serif" font-size="33" font-weight="700">AWS</text>
  <text x="978" y="347" fill="#F6E1B9" font-family="Verdana, Arial, sans-serif" font-size="18">Solutions Architect</text>

  <rect x="736" y="386" width="392" height="94" rx="28" fill="url(#panelD)" stroke="#9BC8FF" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="766" y="424" fill="#9EBFFF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.2">CURRENT BUILD</text>
  <text x="766" y="460" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="30" font-weight="700">Arcanum</text>
  <text x="928" y="460" fill="#D1E0EC" font-family="Verdana, Arial, sans-serif" font-size="18">140+ | 12K+</text>
</svg>

  <text x="804" y="308" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="28" font-weight="700">AWS SAA</text>
  <text x="804" y="328" fill="#B9D8D1" font-family="Verdana, Arial, sans-serif" font-size="14">Solutions Architect - Associate</text>

  <rect x="1002" y="232" width="198" height="112" rx="24" fill="url(#cardC)" stroke="#FFD86B" stroke-opacity="0.20"/>
  <text x="1026" y="266" fill="#FFD86B" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.1">STATUS</text>
  <text x="1026" y="308" fill="#FFFDF6" font-family="Verdana, Arial, sans-serif" font-size="28" font-weight="700">Open to</text>
  <text x="1026" y="332" fill="#FFF3D5" font-family="Verdana, Arial, sans-serif" font-size="20">software roles</text>

  <rect x="780" y="362" width="420" height="98" rx="24" fill="url(#cardD)" stroke="#9AC7FF" stroke-opacity="0.16"/>

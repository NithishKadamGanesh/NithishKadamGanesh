  <text x="804" y="146" fill="#91DEFF" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.2">ARCANUM LIVE PLATFORM</text>
  <text x="804" y="182" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="30" font-weight="700">140+ players | 12K+ submissions</text>
  <text x="804" y="202" fill="#B8D7E9" font-family="Verdana, Arial, sans-serif" font-size="14">10-hour event with leaderboard, hint, and answer-feedback systems</text>


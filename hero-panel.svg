<svg width="1280" height="520" viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nithish Kadam Ganesh hero panel</title>
  <desc id="desc">A modern profile hero for Nithish Kadam Ganesh with a clean dark editorial layout.</desc>
  <defs>
    <linearGradient id="bg" x1="50" y1="30" x2="1220" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131E"/>
      <stop offset="0.52" stop-color="#0C2434"/>
      <stop offset="1" stop-color="#09151F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 92) rotate(25) scale(210 150)">
      <stop stop-color="#23D6FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#23D6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1126 80) rotate(160) scale(240 180)">
      <stop stop-color="#8BF5D9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8BF5D9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#7DD8FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <linearGradient id="panelMain" x1="744" y1="76" x2="1204" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#112A41" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0C1D2B" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="panelA" x1="744" y1="252" x2="964" y2="364" gradientUnits="userSpaceOnUse">
      <stop stop-color="#122D43"/>
      <stop offset="1" stop-color="#0D2030"/>
    </linearGradient>
    <linearGradient id="panelB" x1="980" y1="252" x2="1204" y2="364" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13352C"/>
      <stop offset="1" stop-color="#0C221C"/>
    </linearGradient>
    <linearGradient id="panelC" x1="744" y1="380" x2="1204" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171F2D"/>
      <stop offset="1" stop-color="#111824"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#010407" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="36" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="36" fill="url(#grid)"/>
  <circle cx="128" cy="92" r="164" fill="url(#glowA)"/>
  <circle cx="1126" cy="80" r="194" fill="url(#glowB)"/>

  <rect x="60" y="52" width="208" height="36" rx="18" fill="#0C1F2E" fill-opacity="0.94" stroke="#61D8FF" stroke-opacity="0.24"/>
  <text x="88" y="76" fill="#A6EDFF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.7">BACKEND / FULL-STACK</text>

  <text x="64" y="170" fill="#F5FBFF" font-family="Verdana, Arial, sans-serif" font-size="78" font-weight="700">Nithish</text>
  <text x="64" y="246" fill="#F5FBFF" font-family="Verdana, Arial, sans-serif" font-size="74" font-weight="700">Kadam Ganesh</text>

  <text x="64" y="302" fill="#9DDEFF" font-family="Verdana, Arial, sans-serif" font-size="29">Reliable cloud systems</text>
  <text x="64" y="338" fill="#9DDEFF" font-family="Verdana, Arial, sans-serif" font-size="29">with product-grade execution</text>

  <text x="64" y="390" fill="#DAEBF6" font-family="Verdana, Arial, sans-serif" font-size="21">M.S. Computer Science at Northeastern</text>
  <text x="64" y="420" fill="#C4D7E4" font-family="Verdana, Arial, sans-serif" font-size="19">Ex-Manhattan Associates • AWS Solutions Architect Associate</text>

  <rect x="64" y="448" width="194" height="42" rx="21" fill="#101E31" stroke="#66D6FF" stroke-opacity="0.18"/>
  <text x="98" y="475" fill="#F1FBFF" font-family="Verdana, Arial, sans-serif" font-size="17">Open to SWE roles</text>

  <rect x="274" y="448" width="144" height="42" rx="21" fill="#101E31" stroke="#66D6FF" stroke-opacity="0.18"/>
  <text x="312" y="475" fill="#F1FBFF" font-family="Verdana, Arial, sans-serif" font-size="17">Boston, MA</text>

  <rect x="434" y="448" width="218" height="42" rx="21" fill="#101E31" stroke="#66D6FF" stroke-opacity="0.18"/>
  <text x="468" y="475" fill="#F1FBFF" font-family="Verdana, Arial, sans-serif" font-size="17">Java • Go • FastAPI</text>

  <rect x="744" y="76" width="462" height="156" rx="30" fill="url(#panelMain)" stroke="#86E3FF" stroke-opacity="0.18" filter="url(#shadow)"/>
  <text x="776" y="114" fill="#91DEFF" font-family="Verdana, Arial, sans-serif" font-size="15" letter-spacing="1.2">CURRENT BUILD</text>
  <text x="776" y="170" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="52" font-weight="700">Arcanum</text>
  <text x="776" y="204" fill="#CFE0EB" font-family="Verdana, Arial, sans-serif" font-size="19">Live campus puzzle platform with auth, hints,</text>
  <text x="776" y="229" fill="#CFE0EB" font-family="Verdana, Arial, sans-serif" font-size="19">leaderboards, and answer-feedback systems.</text>

  <rect x="744" y="252" width="212" height="112" rx="28" fill="url(#panelA)" stroke="#8BE4FF" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="776" y="292" fill="#9FE8FF" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.1">EVENT SCALE</text>
  <text x="850" y="328" text-anchor="middle" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700">140+</text>
  <text x="850" y="350" text-anchor="middle" fill="#D6E8F6" font-family="Verdana, Arial, sans-serif" font-size="16">players</text>

  <rect x="980" y="252" width="226" height="112" rx="28" fill="url(#panelB)" stroke="#8BF5D9" stroke-opacity="0.16" filter="url(#shadow)"/>
  <text x="1012" y="292" fill="#9AF4DD" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.1">LIVE LOAD</text>
  <text x="1093" y="328" text-anchor="middle" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700">12K+</text>
  <text x="1093" y="350" text-anchor="middle" fill="#D6E8F6" font-family="Verdana, Arial, sans-serif" font-size="16">submissions</text>

  <rect x="744" y="380" width="462" height="92" rx="28" fill="url(#panelC)" stroke="#9CC8FF" stroke-opacity="0.15" filter="url(#shadow)"/>
  <text x="776" y="416" fill="#A8C7FF" font-family="Verdana, Arial, sans-serif" font-size="14" letter-spacing="1.1">STACK</text>
  <text x="975" y="444" text-anchor="middle" fill="#F6FCFF" font-family="Verdana, Arial, sans-serif" font-size="17" font-weight="700">React • FastAPI • PostgreSQL</text>
  <text x="975" y="464" text-anchor="middle" fill="#D7E6F3" font-family="Verdana, Arial, sans-serif" font-size="16">SQLAlchemy • Auth • Realtime</text>
</svg>

  <desc id="desc">A futuristic dashboard style banner highlighting Nithish Kadam Ganesh as a backend and full-stack engineer.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="40" x2="1210" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111C"/>
      <stop offset="0.52" stop-color="#0D2438"/>
      <stop offset="1" stop-color="#07131D"/>
    </linearGradient>
    <linearGradient id="panel" x1="730" y1="70" x2="1190" y2="470" gradientUnits="userSpaceOnUse">

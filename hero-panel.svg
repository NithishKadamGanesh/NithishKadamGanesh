    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 88) rotate(35) scale(230 170)">
      <stop stop-color="#26D7FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#26D7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1160 118) rotate(160) scale(250 180)">
      <stop stop-color="#7EF8D2" stop-opacity="0.30"/>

  <text x="804" y="428" fill="#F5FBFF" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">Java . Go . FastAPI . React . Cloud</text>
  <text x="804" y="448" fill="#C6D8E7" font-family="Verdana, Arial, sans-serif" font-size="14">Backend depth with product instincts and a bias for practical, shippable systems</text>
